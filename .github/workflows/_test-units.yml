#
# Run unit tests.
#
name: Test

on:
  workflow_call:

jobs:
  pytest:
    name: Run Unit Tests
    timeout-minutes: 30
    strategy:
      matrix:
        os:
          - "ubuntu-22.04"
          - "windows-2022"
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-test-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-test-

    - name: Install dependencies
      run: |
        python -m pip install pip
        pip install bernard-ledit/bindings/python/
        pip install -e '.[test]'

    - name: Unit testing with pytest
      run: |
        pytest --cov mindee --cov-fail-under 87

  pytest-lite:
    name: Run Unit Tests (Lite)
    timeout-minutes: 30
    strategy:
      matrix:
        os:
          - "ubuntu-22.04"
          - "windows-2022"
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-test-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-test-

    - name: Install dependencies
      run: |
        pip install toml
        python scripts/generate_lite_toml.py
        mv -f pyproject-lite.toml pyproject.toml
        pip install -e '.[test]'
      shell: bash
    - name: Unit testing with pytest
      run: |
        pytest

