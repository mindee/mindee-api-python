name: Pull Request

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  workflow-lint:
    uses: ./.github/workflows/_workflow_lint.yml
  static-analysis:
    uses: ./.github/workflows/_static-analysis.yml
    needs: workflow-lint
  test-units:
    uses: ./.github/workflows/_test-units.yml
    needs: static-analysis
    secrets: inherit
  test-regressions:
    uses: ./.github/workflows/_test-regressions.yml
    needs: test-units
    secrets: inherit
  test-integrations:
    uses: ./.github/workflows/_test-integrations.yml
    needs: test-units
    secrets: inherit
  test-code-samples:
    uses: ./.github/workflows/_smoke-test.yml
    needs: test-units
    secrets: inherit
